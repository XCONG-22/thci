# 用法：docker compose up --build
# 他人访问：http://<本机局域网IP>:3000
services:
  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      # 可选：在服务器上提供云端识图（勿把密钥提交到 Git）
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_API_BASE: ${OPENAI_API_BASE:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
    volumes:
      # 持久化上传的字体与 manifest（重启容器不丢）
      - font_uploads:/app/uploads

volumes:
  font_uploads:
