<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title data-title-zh="GAZE · 动态设计" data-title-en="GAZE · Motion">GAZE · 动态设计</title>
    <meta name="description" content="GAZE — 动态短片与主视觉" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Serif+SC:wght@400;600;700&family=Instrument+Sans:ital,wght@0,400;0,600;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="lang-switch.css" />
    <style>
      :root {
        --bg: #f5f5f5;
        --bg-elevated: #fafafa;
        --ink: #141312;
        --ink-muted: #5c5854;
        --line: rgba(20, 19, 18, 0.08);
        --shadow: 0 18px 50px rgba(20, 19, 18, 0.08);
        --nav-h: 64px;
        --accent: #c2410c;
        --chip-bg: rgba(20, 19, 18, 0.04);
        --card-bg: #ffffff;
        --serif: "Noto Serif SC", "Times New Roman", "Times", serif;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Noto Sans SC", "Instrument Sans", system-ui, sans-serif;
        background: var(--bg);
        color: var(--ink);
        line-height: 1.55;
        -webkit-font-smoothing: antialiased;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .skip-link {
        position: absolute;
        left: -9999px;
        top: auto;
        width: 1px;
        height: 1px;
        overflow: hidden;
      }

      .skip-link:focus {
        left: 16px;
        top: 16px;
        width: auto;
        height: auto;
        padding: 8px 14px;
        background: var(--ink);
        color: var(--bg);
        border-radius: 8px;
        z-index: 1000;
      }

      .site-header {
        position: sticky;
        top: 0;
        z-index: 50;
        height: var(--nav-h);
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 0 clamp(16px, 4vw, 40px);
        background: color-mix(in srgb, var(--bg) 88%, transparent);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border-bottom: 1px solid var(--line);
      }

      .brand {
        display: flex;
        flex-direction: column;
        gap: 2px;
        flex-shrink: 0;
      }

      .brand-mark {
        font-family: "Instrument Sans", sans-serif;
        font-weight: 600;
        font-size: 1.05rem;
        letter-spacing: -0.02em;
      }

      .brand-sub {
        font-size: 0.72rem;
        color: var(--ink-muted);
        font-weight: 500;
      }

      .nav-back {
        flex: 1;
        min-width: 0;
        font-size: 0.82rem;
        font-weight: 600;
        color: var(--accent);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .nav-back:hover {
        text-decoration: underline;
      }

      .nav-back:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 3px;
        border-radius: 4px;
      }

      .header-end {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
      }

      .nav-about {
        padding: 8px 12px;
        border-radius: 999px;
        font-size: 0.78rem;
        font-weight: 500;
        color: var(--ink-muted);
        border: 1px solid transparent;
        transition: background 0.2s, color 0.2s;
        white-space: nowrap;
      }

      .nav-about:hover {
        background: var(--chip-bg);
        color: var(--ink);
      }

      .nav-about:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .project-page {
        max-width: 960px;
        margin: 0 auto;
        padding: clamp(28px, 5vw, 56px) clamp(16px, 4vw, 40px) clamp(48px, 8vw, 88px);
      }

      .project-intro {
        text-align: center;
        margin-bottom: clamp(28px, 5vw, 44px);
      }

      .project-intro__kicker {
        margin: 0 0 10px;
        font-size: 0.78rem;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--accent);
      }

      .project-intro h1 {
        margin: 0 0 14px;
        font-family: var(--serif);
        font-size: clamp(1.65rem, 4vw, 2.2rem);
        font-weight: 700;
        letter-spacing: 0.02em;
        line-height: 1.2;
      }

      .project-intro__lead {
        margin: 0 auto;
        max-width: 48ch;
        font-family: var(--serif);
        font-size: 0.98rem;
        font-style: italic;
        color: #6a655f;
        line-height: 1.6;
      }

      .project-gallery {
        display: flex;
        flex-direction: column;
        gap: clamp(14px, 2.5vw, 24px);
      }

      .project-gallery figure {
        margin: 0;
        border: 1px solid var(--line);
        background: var(--card-bg);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .project-gallery img {
        width: 100%;
        height: auto;
        display: block;
        vertical-align: middle;
      }

      .site-footer {
        padding: 28px clamp(16px, 4vw, 40px) 40px;
        border-top: 1px solid var(--line);
        text-align: center;
        font-size: 0.8rem;
        color: var(--ink-muted);
      }

      .site-footer a {
        color: var(--accent);
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#main"><span data-i18n-zh="跳到主要内容" data-i18n-en="Skip to main content">跳到主要内容</span></a>

    <header class="site-header">
      <a
        class="brand"
        href="portfolio.html"
        data-i18n-aria-zh="返回作品集首页"
        data-i18n-aria-en="Back to portfolio home"
        aria-label="返回作品集首页"
      >
        <span class="brand-mark">Portfolio</span>
        <span class="brand-sub"><span data-i18n-zh="作品集" data-i18n-en="Home">作品集</span></span>
      </a>
      <a class="nav-back" href="portfolio.html#motion"
        ><span data-i18n-zh="← 返回作品列表" data-i18n-en="← Back to works">← 返回作品列表</span></a
      >
      <div class="header-end">
        <a class="nav-about" href="about.html"><span data-i18n-zh="关于" data-i18n-en="About">关于</span></a>
        <div class="lang-switch" role="group" aria-label="语言 / Language">
          <button type="button" data-set-lang="zh" class="is-active">中</button>
          <button type="button" data-set-lang="en">EN</button>
        </div>
      </div>
    </header>

    <main id="main" class="project-page">
      <header class="project-intro">
        <p class="project-intro__kicker">
          <span data-i18n-zh="动态设计" data-i18n-en="Motion">动态设计</span>
        </p>
        <h1><span data-i18n-zh="GAZE" data-i18n-en="GAZE">GAZE</span></h1>
        <p class="project-intro__lead">
          <span
            data-i18n-zh="城市寓言 · 网络病毒意象 · 动态短片叙事"
            data-i18n-en="Urban fable · Network-virus motif · Motion narrative"
            >城市寓言 · 网络病毒意象 · 动态短片叙事</span
          >
        </p>
      </header>

      <div class="project-gallery" aria-label="GAZE 作品图">
        <figure>
          <img
            src="work-motion/01.png"
            alt="GAZE 主视觉与说明"
            data-i18n-alt-zh="GAZE 主视觉与说明"
            data-i18n-alt-en="GAZE key visual and synopsis"
            loading="eager"
            decoding="async"
          />
        </figure>
        <figure>
          <img
            src="work-motion/02.png"
            alt="GAZE 视频截选"
            data-i18n-alt-zh="GAZE 视频截选"
            data-i18n-alt-en="GAZE video stills"
            loading="lazy"
            decoding="async"
          />
        </figure>
      </div>
    </main>

    <footer class="site-footer">
      <p>
        <a href="portfolio.html"><span data-i18n-zh="回到作品集" data-i18n-en="Back to portfolio">回到作品集</span></a>
      </p>
    </footer>

    <script src="lang-switch.js"></script>
  </body>
</html>
