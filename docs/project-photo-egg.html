<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title data-title-zh="卵 · 摄影作品" data-title-en="Egg · Photography">卵 · 摄影作品</title>
    <meta name="description" content="静物与人像习作：双色光鸡蛋、渔港与劳作场景。" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Serif+SC:wght@400;600;700&family=Instrument+Sans:ital,wght@0,400;0,600;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="lang-switch.css" />
    <style>
      :root {
        --bg: #f5f5f5;
        --ink: #141312;
        --ink-muted: #5c5854;
        --line: rgba(20, 19, 18, 0.1);
        --shadow: 0 18px 50px rgba(20, 19, 18, 0.08);
        --nav-h: 64px;
        --accent: #c2410c;
        --chip-bg: rgba(20, 19, 18, 0.04);
        --card-bg: #ffffff;
        --serif: "Noto Serif SC", "Times New Roman", "Times", serif;
        --photo-mat: clamp(14px, 2.4vw, 22px);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Noto Sans SC", "Instrument Sans", system-ui, sans-serif;
        background: var(--bg);
        color: var(--ink);
        line-height: 1.55;
        -webkit-font-smoothing: antialiased;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .skip-link {
        position: absolute;
        left: -9999px;
        top: auto;
        width: 1px;
        height: 1px;
        overflow: hidden;
      }

      .skip-link:focus {
        left: 16px;
        top: 16px;
        width: auto;
        height: auto;
        padding: 8px 14px;
        background: var(--ink);
        color: var(--bg);
        border-radius: 8px;
        z-index: 1000;
      }

      .site-header {
        position: sticky;
        top: 0;
        z-index: 50;
        height: var(--nav-h);
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 0 clamp(16px, 4vw, 40px);
        background: color-mix(in srgb, var(--bg) 88%, transparent);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border-bottom: 1px solid var(--line);
      }

      .brand {
        display: flex;
        flex-direction: column;
        gap: 2px;
        flex-shrink: 0;
      }

      .brand-mark {
        font-family: "Instrument Sans", sans-serif;
        font-weight: 600;
        font-size: 1.05rem;
        letter-spacing: -0.02em;
      }

      .brand-sub {
        font-size: 0.72rem;
        color: var(--ink-muted);
        font-weight: 500;
      }

      .nav-back {
        flex: 1;
        min-width: 0;
        font-size: 0.82rem;
        font-weight: 600;
        color: var(--accent);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .nav-back:hover {
        text-decoration: underline;
      }

      .nav-back:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 3px;
        border-radius: 4px;
      }

      .header-end {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
      }

      .nav-about {
        padding: 8px 12px;
        border-radius: 999px;
        font-size: 0.78rem;
        font-weight: 500;
        color: var(--ink-muted);
        border: 1px solid transparent;
        transition: background 0.2s, color 0.2s;
        white-space: nowrap;
      }

      .nav-about:hover {
        background: var(--chip-bg);
        color: var(--ink);
      }

      .nav-about:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .project-page {
        max-width: 880px;
        margin: 0 auto;
        padding: clamp(28px, 5vw, 56px) clamp(16px, 4vw, 40px) clamp(48px, 8vw, 88px);
      }

      .project-intro {
        text-align: center;
        margin-bottom: clamp(24px, 4vw, 40px);
      }

      .project-intro__kicker {
        margin: 0 0 10px;
        font-size: 0.78rem;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--accent);
      }

      .project-intro h1 {
        margin: 0;
        font-family: var(--serif);
        font-size: clamp(1.65rem, 4vw, 2.2rem);
        font-weight: 700;
        letter-spacing: 0.02em;
        line-height: 1.2;
      }

      .photo-gallery {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: clamp(10px, 1.8vw, 18px);
        align-items: start;
        max-width: min(760px, 100%);
        margin-inline: auto;
      }

      .photo-gallery figure {
        margin: 0;
        border: 1px solid var(--line);
        background: #fff;
        box-shadow: var(--shadow);
        overflow: hidden;
        padding: var(--photo-mat);
        display: flex;
        align-items: center;
        justify-content: center;
        box-sizing: border-box;
      }

      .photo-gallery img {
        width: auto;
        max-width: 82%;
        height: auto;
        display: block;
        vertical-align: middle;
      }

      .photo-gallery__rule {
        grid-column: 1 / -1;
        margin: clamp(6px, 1.5vw, 14px) 0 clamp(4px, 1vw, 10px);
        border: 0;
        border-top: 1px solid rgba(20, 19, 18, 0.22);
      }

      .photo-gallery__section-title {
        grid-column: 1 / -1;
        margin: clamp(6px, 1.2vw, 14px) 0 clamp(12px, 2vw, 20px);
        font-family: "Instrument Sans", system-ui, sans-serif;
        font-size: clamp(0.82rem, 1.8vw, 1.05rem);
        font-weight: 600;
        letter-spacing: 0.32em;
        text-align: center;
        color: var(--ink-muted);
      }

      @media (max-width: 560px) {
        .photo-gallery {
          grid-template-columns: 1fr;
        }
      }

      .site-footer {
        padding: 28px clamp(16px, 4vw, 40px) 40px;
        border-top: 1px solid var(--line);
        text-align: center;
        font-size: 0.8rem;
        color: var(--ink-muted);
      }

      .site-footer a {
        color: var(--accent);
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#main"><span data-i18n-zh="跳到主要内容" data-i18n-en="Skip to main content">跳到主要内容</span></a>

    <header class="site-header">
      <a
        class="brand"
        href="portfolio.html"
        data-i18n-aria-zh="返回作品集首页"
        data-i18n-aria-en="Back to portfolio home"
        aria-label="返回作品集首页"
      >
        <span class="brand-mark">Portfolio</span>
        <span class="brand-sub"><span data-i18n-zh="作品集" data-i18n-en="Home">作品集</span></span>
      </a>
      <a class="nav-back" href="portfolio.html#photo"
        ><span data-i18n-zh="← 返回作品列表" data-i18n-en="← Back to works">← 返回作品列表</span></a
      >
      <div class="header-end">
        <a class="nav-about" href="about.html"><span data-i18n-zh="关于" data-i18n-en="About">关于</span></a>
        <div class="lang-switch" role="group" aria-label="语言 / Language">
          <button type="button" data-set-lang="zh" class="is-active">中</button>
          <button type="button" data-set-lang="en">EN</button>
        </div>
      </div>
    </header>

    <main id="main" class="project-page">
      <header class="project-intro">
        <p class="project-intro__kicker">
          <span data-i18n-zh="摄影作品" data-i18n-en="Photography">摄影作品</span>
        </p>
        <h1><span data-i18n-zh="卵" data-i18n-en="Egg">卵</span></h1>
      </header>

      <div class="photo-gallery" aria-label="卵 摄影图集">
        <figure>
          <img
            src="work-photography-egg/01.png"
            alt="静物：双色光鸡蛋（绿与品红）"
            data-i18n-alt-zh="静物：双色光鸡蛋（绿与品红）"
            data-i18n-alt-en="Still life: egg under green and magenta gels"
            loading="eager"
            decoding="async"
          />
        </figure>
        <figure>
          <img
            src="work-photography-egg/03.png"
            alt="静物：冷光下的鸡蛋"
            data-i18n-alt-zh="静物：冷光下的鸡蛋"
            data-i18n-alt-en="Still life: egg in cool spotlight"
            loading="lazy"
            decoding="async"
          />
        </figure>
        <figure>
          <img
            src="work-photography-egg/04.png"
            alt="静物：冷暖双色光鸡蛋"
            data-i18n-alt-zh="静物：冷暖双色光鸡蛋"
            data-i18n-alt-en="Still life: egg with warm and cool split light"
            loading="lazy"
            decoding="async"
          />
        </figure>
        <figure>
          <img
            src="work-photography-egg/05.png"
            alt="静物：高对比黑白鸡蛋"
            data-i18n-alt-zh="静物：高对比黑白鸡蛋"
            data-i18n-alt-en="Still life: high-contrast black-and-white egg"
            loading="lazy"
            decoding="async"
          />
        </figure>
        <hr class="photo-gallery__rule" aria-hidden="true" />
        <h2 class="photo-gallery__section-title">COASTAL TRACES</h2>
        <figure>
          <img
            src="work-photography-egg/coastal-nets.png"
            alt="渔港：绿色渔网与绳索"
            data-i18n-alt-zh="渔港：绿色渔网与绳索"
            data-i18n-alt-en="Harbour: green nets and rope"
            loading="lazy"
            decoding="async"
          />
        </figure>
        <figure>
          <img
            src="work-photography-egg/06.png"
            alt="人像场景：框景中背影垂钓，鱼竿伸向右上方"
            data-i18n-alt-zh="人像场景：框景中背影垂钓，鱼竿伸向右上方"
            data-i18n-alt-en="Figure: fisherman from behind through a frame, rod toward upper right"
            loading="lazy"
            decoding="async"
          />
        </figure>
        <figure>
          <img
            src="work-photography-egg/07.png"
            alt="人像场景：水边垂钓"
            data-i18n-alt-zh="人像场景：水边垂钓"
            data-i18n-alt-en="Figure: fishing by the water"
            loading="lazy"
            decoding="async"
          />
        </figure>
        <figure>
          <img
            src="work-photography-egg/08.png"
            alt="人像场景：晒鱼与劳作"
            data-i18n-alt-zh="人像场景：晒鱼与劳作"
            data-i18n-alt-en="Figure: drying fish and work"
            loading="lazy"
            decoding="async"
          />
        </figure>
        <figure>
          <img
            src="work-photography-egg/09.png"
            alt="人像场景：提鱼行走"
            data-i18n-alt-zh="人像场景：提鱼行走"
            data-i18n-alt-en="Figure: carrying fish"
            loading="lazy"
            decoding="async"
          />
        </figure>
      </div>
    </main>

    <footer class="site-footer">
      <p>
        <a href="portfolio.html"><span data-i18n-zh="回到作品集" data-i18n-en="Back to portfolio">回到作品集</span></a>
      </p>
    </footer>

    <script src="lang-switch.js"></script>
  </body>
</html>
