<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sleep Island | Disturbance Interface</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Manrope:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="disturbance.css">
</head>
<body>
  <canvas id="lab-canvas" aria-hidden="true"></canvas>
  <main class="lab-shell">
    <header class="lab-header">
      <p class="tag" id="tag-text">Sleep Island / Disturbance Lab</p>
      <h1 id="title-text">生态扰动交互舱</h1>
      <p class="lead" id="lead-text">拖动鼠标在液态生态中注入扰动，观察释氧、湿度震荡与菌丝韧性重组。</p>
      <div class="lang-switch">
        <button id="lang-zh" class="active">中文</button>
        <button id="lang-en">EN</button>
      </div>
    </header>

    <section class="panel controls">
      <label id="range-label" for="disturbance-range">扰动强度</label>
      <input id="disturbance-range" type="range" min="0.2" max="2.2" value="1" step="0.1">
      <div class="buttons">
        <button id="inject-btn">注入扰动脉冲</button>
        <button id="stabilize-btn">生态稳定</button>
        <button id="random-btn">随机异常</button>
        <a id="back-link" href="index.html">返回主界面</a>
      </div>
    </section>

    <section class="panel metrics">
      <article><span id="agitation-label">Agitation</span><strong id="agitation-val">0.22</strong></article>
      <article><span id="oxygen-label">Oxygen Burst</span><strong id="oxygen-val">42%</strong></article>
      <article><span id="humidity-label">Humidity Shock</span><strong id="humidity-val">18%</strong></article>
      <article><span id="resilience-label">Mycelium Resilience</span><strong id="resilience-val">0.71</strong></article>
    </section>

    <section class="panel narrative">
      <h2 id="narrative-title">生态响应叙事</h2>
      <p id="narrative-text">系统平稳：藻层轻微摆动，呼吸与湿度保持缓慢同步。</p>
    </section>
  </main>
  <script src="disturbance.js"></script>
</body>
</html>
